<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3d4a2a">
  <meta name="description" content="Pianificatore per il tuo orto">
  <title>Orto · Pianificatore</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <svg class="brand-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4 C12 4, 6 10, 6 18 C6 24, 10 28, 14 30 L14 36 L26 36 L26 30 C30 28, 34 24, 34 18 C34 10, 28 4, 20 4 Z" fill="currentColor" opacity="0.15"/>
            <path d="M20 6 C20 6, 14 12, 14 20 C14 28, 20 34, 20 34 M20 6 C20 6, 26 12, 26 20 C26 28, 20 34, 20 34 M20 6 L20 34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div>
            <h1 class="brand-name">Orto</h1>
            <p class="brand-sub">Emilia-Romagna</p>
          </div>
        </div>
        <button id="installBtn" class="install-btn" hidden>Installa</button>
      </div>
    </header>

    <!-- Main content -->
    <main id="main" class="main">
      <!-- Le viste vengono iniettate da JS -->
    </main>

    <!-- Bottom nav -->
    <nav class="nav">
      <button class="nav-btn active" data-view="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 11l9-8 9 8M5 10v10h14V10" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Oggi</span>
      </button>
      <button class="nav-btn" data-view="calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4" stroke-linecap="round"/></svg>
        <span>Calendario</span>
      </button>
      <button class="nav-btn" data-view="garden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8 6 8 10 12 14C16 10 16 6 12 2zM12 14v8M5 22h14" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Le mie</span>
      </button>
      <button class="nav-btn" data-view="catalog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16v16H4zM4 9h16M9 4v16" stroke-linecap="round"/></svg>
        <span>Catalogo</span>
      </button>
      <button class="nav-btn" data-view="map">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2zM9 4v16M15 6v16" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Mappa</span>
      </button>
    </nav>
  </div>

  <!-- Modal generico -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div id="modalContent" class="modal-content"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
